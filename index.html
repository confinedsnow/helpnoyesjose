<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SS Executor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #131317; border-bottom: 1px solid #2a2a35; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 700; color: #a97bff; letter-spacing: 1px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #3a3a4a; transition: background 0.3s; }
  .dot.online { background: #4cff91; box-shadow: 0 0 6px #4cff91; }
  .container { display: grid; grid-template-columns: 260px 1fr; flex: 1; }
  .sidebar { background: #111115; border-right: 1px solid #1e1e28; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #555; margin-bottom: 4px; }
  .server-card { background: #18181f; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .server-card:hover { border-color: #a97bff; }
  .server-card.selected { border-color: #a97bff; background: #1f1830; }
  .server-card .place { font-size: 13px; font-weight: 600; color: #ccc; }
  .server-card .job { font-size: 10px; color: #555; margin-top: 2px; word-break: break-all; }
  .server-card .players { font-size: 11px; color: #4cff91; margin-top: 4px; }
  .no-servers { font-size: 12px; color: #444; text-align: center; margin-top: 20px; }
  .main { display: flex; flex-direction: column; }
  .auth-bar { background: #131317; border-bottom: 1px solid #1e1e28; padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .auth-bar label { font-size: 12px; color: #777; }
  .auth-bar input { background: #1a1a22; border: 1px solid #2a2a35; border-radius: 6px; color: #e0e0e0; padding: 6px 10px; font-size: 12px; outline: none; width: 200px; }
  .auth-bar input:focus { border-color: #a97bff; }
  .editor-area { flex: 1; display: flex; flex-direction: column; padding: 16px 20px; gap: 10px; }
  .editor-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: #555; }
  textarea#codeInput { flex: 1; min-height: 220px; background: #101014; border: 1px solid #2a2a35; border-radius: 8px; color: #c9e8ff; font-family: 'Consolas', monospace; font-size: 13px; padding: 12px; resize: vertical; outline: none; line-height: 1.6; transition: border-color 0.2s; }
  textarea#codeInput:focus { border-color: #a97bff; }
  .btn-row { display: flex; gap: 10px; }
  button { border: none; border-radius: 7px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-execute { background: #a97bff; color: #fff; }
  .btn-clear { background: #1e1e28; color: #aaa; }
  .btn-refresh { background: #1e1e28; color: #aaa; font-size: 12px; padding: 6px 12px; }
  .console-area { border-top: 1px solid #1e1e28; padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }
  .console-header { display: flex; align-items: center; justify-content: space-between; }
  #console { background: #0a0a0d; border: 1px solid #1e1e28; border-radius: 8px; padding: 10px 12px; height: 160px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.7; }
  .log-success { color: #4cff91; }
  .log-error { color: #ff6b6b; }
  .log-info { color: #a97bff; }
  .log-dim { color: #555; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: #1e1e28; border: 1px solid #a97bff; border-radius: 8px; padding: 10px 18px; font-size: 13px; color: #e0e0e0; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="dot" id="statusDot"></div>
  <h1>✦ SS EXECUTOR</h1>
</header>

<div class="container">
  <div class="sidebar">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2>Active Servers</h2>
      <button class="btn-refresh" onclick="loadServers()">↻ Refresh</button>
    </div>
    <div id="serverList"><p class="no-servers">Click Refresh to load servers.</p></div>
  </div>

  <div class="main">
    <div class="auth-bar">
      <label>Roblox Username</label>
      <input type="text" id="usernameInput" placeholder="e.g. Robloxian123" />
    </div>

    <div class="editor-area">
      <span class="editor-label">Script Editor</span>
      <textarea id="codeInput" placeholder="-- Enter your Lua script here&#10;print('Hello from SS Executor!')&#10;&#10;-- Use 'player' to reference the username above&#10;-- Example: player.Character.Humanoid.Health = 0"></textarea>
      <div class="btn-row">
        <button class="btn-execute" onclick="executeScript()" id="execBtn" disabled>▶ Execute</button>
        <button class="btn-clear" onclick="clearEditor()">✕ Clear</button>
      </div>
    </div>

    <div class="console-area">
      <div class="console-header">
        <span class="editor-label">Console Output</span>
        <button class="btn-refresh" onclick="clearConsole()">Clear</button>
      </div>
      <div id="console">
        <span class="log-info">[SS-EXEC] Ready. Click Refresh to find your game server.</span><br/>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const BASE_URL = window.location.origin;
  const API_KEY = "mypassword123";
  let selectedServer = null;

  function log(msg, type = "info") {
    const el = document.getElementById("console");
    const line = document.createElement("span");
    line.className = `log-${type}`;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    el.appendChild(line);
    el.appendChild(document.createElement("br"));
    el.scrollTop = el.scrollHeight;
  }

  function clearConsole() { document.getElementById("console").innerHTML = ""; }

  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2500);
  }

  async function loadServers() {
    const res = await fetch(`${BASE_URL}/api/servers?apiKey=${encodeURIComponent(API_KEY)}`);
    const data = await res.json();
    const list = document.getElementById("serverList");

    if (!data.servers || data.servers.length === 0) {
      list.innerHTML = `<p class="no-servers">No servers online.</p>`;
      document.getElementById("statusDot").className = "dot";
      return;
    }

    document.getElementById("statusDot").className = "dot online";
    list.innerHTML = "";
    data.servers.forEach(s => {
      const card = document.createElement("div");
      card.className = "server-card" + (selectedServer?.jobId === s.jobId ? " selected" : "");
      card.innerHTML = `
        <div class="place">Place ID: ${s.placeId}</div>
        <div class="job">${s.jobId}</div>
        <div class="players">👥 ${s.playerCount} player(s)</div>
      `;
      card.onclick = () => {
        selectedServer = s;
        document.querySelectorAll(".server-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        document.getElementById("execBtn").disabled = false;
        log(`Selected server — PlaceId: ${s.placeId}`, "info");
        toast("Server selected!");
      };
      list.appendChild(card);
    });
  }

  async function executeScript() {
    const code = document.getElementById("codeInput").value.trim();
    const username = document.getElementById("usernameInput").value.trim();
    if (!code) { log("Script is empty.", "error"); return; }
    if (!selectedServer) { log("No server selected.", "error"); return; }

    log(`Sending script to server ${selectedServer.jobId}...`, "dim");

    const res = await fetch(`${BASE_URL}/api/execute`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ apiKey: API_KEY, jobId: selectedServer.jobId, code, username }),
    });

    const data = await res.json();
    if (data.ok) {
      log(`✓ Script queued! ID: ${data.scriptId}`, "success");
      toast("✓ Script sent!");
    } else {
      log(`Error: ${data.error}`, "error");
    }
  }

  function clearEditor() { document.getElementById("codeInput").value = ""; }

  // Auto-refresh servers every 10s
  setInterval(loadServers, 10000);
</script>
</body>
</html>
